name: "Auto Copilot Fix"

on:
  workflow_run:
    workflows:
      - "Copilot code review"
    types:
      - completed
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-copilot-fix:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.actor.type == 'Bot' && github.event.workflow_run.actor.login == 'Copilot' && github.event.workflow_run.repository.full_name == github.repository) || (github.event_name == 'pull_request_review' && github.event.action == 'submitted') }}
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post idempotent Copilot fix request
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TRIGGER_TOKEN }}
          EVENT_REVIEW_BODY: ${{ github.event.review.body }}
          EVENT_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          OWNER="${REPO%%/*}"
          REPO_NAME="${REPO##*/}"

          EVENT_NAME="${{ github.event_name }}"

          PR_NUMBER=""
          REVIEW_ID=""
          REVIEW_BODY=""

          if [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            REVIEW_ID="${{ github.event.review.id }}"
            REVIEW_BODY="$EVENT_REVIEW_BODY"

            # Fallback path only applies when the review explicitly signals suggestions.
            if [[ "$REVIEW_BODY" != *"[EX:REVIEW-HAS-SUGGESTIONS]"* ]]; then
              echo "pull_request_review event without [EX:REVIEW-HAS-SUGGESTIONS]; exiting."
              exit 0
            fi
          else
            BRANCH="$EVENT_HEAD_BRANCH"
            if [[ -z "$BRANCH" ]]; then
              echo "No head_branch in workflow_run payload."
              exit 0
            fi

            PR_JSON=$(gh api \
              "/repos/$REPO/pulls?head=$OWNER:$BRANCH&state=open&per_page=1" \
              --jq '.[0] // empty')

            if [[ -z "$PR_JSON" ]]; then
              echo "No open PR found for branch $BRANCH."
              exit 0
            fi

            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')

            # Try to resolve the latest review id/body as context for idempotency marker.
            REVIEW_JSON=$(gh api \
              "/repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=20" \
              --jq '[.[] | {id, body}] | last // empty')

            REVIEW_ID=$(echo "$REVIEW_JSON" | jq -r '.id // "workflow-run"')
            REVIEW_BODY=$(echo "$REVIEW_JSON" | jq -r '.body // ""')
          fi

          if [[ -z "$PR_NUMBER" ]]; then
            echo "Could not determine PR number."
            exit 0
          fi

          if [[ -z "$REVIEW_ID" ]]; then
            REVIEW_ID="unknown"
          fi

          MARKER="<!-- review-id: $REVIEW_ID -->"

          # Idempotency guard: do not post duplicate trigger comments for same review id.
          EXISTING=$(gh api \
            "/repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq "map(select(.body | contains(\"$MARKER\"))) | length")

          if [[ "$EXISTING" != "0" ]]; then
            echo "Fix-request comment already exists for marker $MARKER."
            exit 0
          fi

          THREADS_JSON=$(gh api graphql \
            -f query='query($owner:String!, $repo:String!, $number:Int!) { repository(owner:$owner, name:$repo) { pullRequest(number:$number) { reviewThreads(first:100) { nodes { isResolved path line comments(first:1) { nodes { url body } } } } } } }' \
            -f owner="$OWNER" \
            -f repo="$REPO_NAME" \
            -F number="$PR_NUMBER")

          UNRESOLVED=$(echo "$THREADS_JSON" | jq -r '
            .data.repository.pullRequest.reviewThreads.nodes
            | map(select(.isResolved == false))
            | .[]
            | "- **`\(.path // \"unknown-file\")`** (line \(.line // 0)): \((.comments.nodes[0].body // \"No body\") | gsub("\\n"; " ") | .[0:200]) [→ view](\(.comments.nodes[0].url // \"\"))"
          ')

          if [[ -z "$UNRESOLVED" ]]; then
            if [[ -n "$REVIEW_BODY" ]]; then
              UNRESOLVED="- Review summary: $REVIEW_BODY"
            else
              echo "No unresolved threads and no review summary available. Exiting."
              exit 0
            fi
          fi

          TAG_LINE="[EX:TRIGGER-FIX-REQUEST]"
          COMMENT_BODY="${TAG_LINE}"$'\n'"${MARKER}"$'\n'"@copilot Please apply fixes for the following unresolved review feedback:"$'\n\n'"${UNRESOLVED}"

          gh api \
            --method POST \
            "/repos/$REPO/issues/$PR_NUMBER/comments" \
            -f body="$COMMENT_BODY" >/dev/null

          echo "Posted fix request on PR #$PR_NUMBER"
