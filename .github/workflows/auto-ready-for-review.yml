name: "Auto Ready for Review"

on:
  workflow_run:
    workflows:
      - "Copilot Push Signal"
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-ready:
    # Security guards: only trusted successful Copilot bot runs from same repository.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.actor.type == 'Bot' && github.event.workflow_run.actor.login == 'Copilot' && github.event.workflow_run.repository.full_name == github.repository }}
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve open PR for workflow_run branch
        id: resolve_pr
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
          EVENT_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          BRANCH="$EVENT_HEAD_BRANCH"

          if [[ -z "$BRANCH" ]]; then
            echo "No head_branch in workflow_run payload. Nothing to do."
            exit 0
          fi

          PR_JSON=$(gh api \
            "/repos/$REPO/pulls?head=${REPO%%/*}:$BRANCH&state=open&per_page=1" \
            --jq '.[0] // empty')

          if [[ -z "$PR_JSON" ]]; then
            echo "No open PR found for branch $BRANCH."
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_NODE_ID=$(echo "$PR_JSON" | jq -r '.node_id')
          PR_DRAFT=$(echo "$PR_JSON" | jq -r '.draft')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_node_id=$PR_NODE_ID" >> "$GITHUB_OUTPUT"
          echo "is_draft=$PR_DRAFT" >> "$GITHUB_OUTPUT"

      - name: Poll for Copilot review request (18x10s)
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ steps.resolve_pr.outputs.pr_number }}"

          for attempt in $(seq 1 18); do
            INDEX=$(gh api "/repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
              --jq '([.users[]?.login] | map(ascii_downcase) | index("copilot")) // ""')

            if [[ -n "$INDEX" && "$INDEX" != "null" ]]; then
              echo "Copilot review request detected on attempt $attempt."
              exit 0
            fi

            echo "Attempt $attempt/18: Copilot review request not found yet. Waiting 10s..."
            sleep 10
          done

          echo "Copilot review request not detected after 18 attempts. Exiting without mutation."
          exit 0

      - name: Mark draft PR ready for review
        if: ${{ steps.resolve_pr.outputs.pr_number != '' && steps.resolve_pr.outputs.is_draft == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          PR_NODE_ID="${{ steps.resolve_pr.outputs.pr_node_id }}"

          gh api graphql \
            -f query='mutation($prId:ID!){ markPullRequestReadyForReview(input:{pullRequestId:$prId}) { clientMutationId } }' \
            -f prId="$PR_NODE_ID" >/dev/null

          echo "PR #${{ steps.resolve_pr.outputs.pr_number }} converted to ready for review."

      - name: Optional issue-index update placeholder
        if: ${{ steps.resolve_pr.outputs.pr_number != '' && hashFiles('.github/issue-index.json') != '' }}
        run: |
          echo ".github/issue-index.json exists; optional in_progress update can run in E0-S6-T6 integration step."
