name: "Auto Validate Copilot Fix"

on:
  workflow_run:
    workflows:
      - "Copilot Push Signal"
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-fix:
    # Security guards: only trusted successful Copilot bot runs from same repository.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.actor.type == 'Bot' && github.event.workflow_run.actor.login == 'Copilot' && github.event.workflow_run.repository.full_name == github.repository }}
    runs-on: self-hosted
    environment: copilot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve open PR for workflow_run branch
        id: resolve_pr
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          if [[ -z "$BRANCH" ]]; then
            echo "No head_branch in workflow_run payload. Nothing to do."
            exit 0
          fi

          PR_JSON=$(gh api \
            "/repos/$REPO/pulls?head=${REPO%%/*}:$BRANCH&state=open&per_page=1" \
            --jq '.[0] // empty')

          if [[ -z "$PR_JSON" ]]; then
            echo "No open PR found for branch $BRANCH."
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_NODE_ID=$(echo "$PR_JSON" | jq -r '.node_id')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_node_id=$PR_NODE_ID" >> "$GITHUB_OUTPUT"

      - name: Search for FIX-APPLIED signal (6x10s retry)
        id: find_fix_signal
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ steps.resolve_pr.outputs.pr_number }}"

          SIGNAL_FOUND=""
          SIGNAL_COMMENT_ID=""
          SIGNAL_BODY=""

          for i in $(seq 1 6); do
            echo "Attempt $i/6 — searching for [EX:FIX-APPLIED] signal..."

            COMMENTS=$(gh api \
              "/repos/$REPO/issues/$PR_NUMBER/comments?per_page=30" \
              --jq 'reverse | .[]')

            while IFS= read -r COMMENT; do
              BODY=$(echo "$COMMENT" | jq -r '.body // ""')
              COMMENT_ID=$(echo "$COMMENT" | jq -r '.id')
              LOGIN=$(echo "$COMMENT" | jq -r '.user.login // ""')

              # Match FIX-APPLIED signal keywords
              if echo "$BODY" | grep -qiE '\[EX:FIX-APPLIED\]|addressed in|applied in'; then
                if [[ "$LOGIN" == "Copilot"* ]] || [[ "$LOGIN" == "copilot"* ]]; then
                  SIGNAL_FOUND="true"
                  SIGNAL_COMMENT_ID="$COMMENT_ID"
                  SIGNAL_BODY="$BODY"
                  break 2
                fi
              fi
            done <<< "$COMMENTS"

            if [[ $i -lt 6 ]]; then
              sleep 10
            fi
          done

          if [[ -z "$SIGNAL_FOUND" ]]; then
            echo "No [EX:FIX-APPLIED] signal found after 6 attempts. Skipping."
            echo "signal_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "signal_found=true" >> "$GITHUB_OUTPUT"
          echo "signal_comment_id=$SIGNAL_COMMENT_ID" >> "$GITHUB_OUTPUT"

          # Store signal body to a file to avoid quoting issues in GITHUB_OUTPUT
          printf '%s' "$SIGNAL_BODY" > /tmp/fix_signal_body.txt
          echo "signal_body_file=/tmp/fix_signal_body.txt" >> "$GITHUB_OUTPUT"

      - name: Verify signal responds to a TRIGGER-FIX-REQUEST and guard duplicate processing
        id: verify_signal
        if: ${{ steps.find_fix_signal.outputs.signal_found == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ steps.resolve_pr.outputs.pr_number }}"
          SIGNAL_COMMENT_ID="${{ steps.find_fix_signal.outputs.signal_comment_id }}"

          # Fetch all comments ordered by creation to check ordering
          COMMENTS=$(gh api \
            "/repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq '[.[] | {id: .id, body: .body, login: .user.login}]')

          # Find most recent TRIGGER-FIX-REQUEST before the FIX-APPLIED signal
          TRIGGER_FOUND=$(echo "$COMMENTS" | jq --argjson signal_id "$SIGNAL_COMMENT_ID" '
            [.[] | select(.id < $signal_id) | select(.body | test("\\[EX:TRIGGER-FIX-REQUEST\\]"; "i"))]
            | length > 0
          ')

          if [[ "$TRIGGER_FOUND" != "true" ]]; then
            echo "No preceding [EX:TRIGGER-FIX-REQUEST] found for this fix signal. Skipping."
            echo "verified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Guard: check if we already processed this signal (look for FIX-VALIDATED or FIX-INCOMPLETE after signal)
          ALREADY_PROCESSED=$(echo "$COMMENTS" | jq --argjson signal_id "$SIGNAL_COMMENT_ID" '
            [.[] | select(.id > $signal_id) | select(.body | test("\\[EX:FIX-INCOMPLETE\\]|\\[EX:REVIEW-CLEAN\\]"; "i"))]
            | length > 0
          ')

          if [[ "$ALREADY_PROCESSED" == "true" ]]; then
            echo "This fix signal was already processed. Skipping to avoid duplicate."
            echo "verified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "verified=true" >> "$GITHUB_OUTPUT"

      - name: Fetch unresolved review threads for evaluation
        id: fetch_threads
        if: ${{ steps.verify_signal.outputs.verified == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          PR_NODE_ID="${{ steps.resolve_pr.outputs.pr_node_id }}"

          THREADS=$(gh api graphql -f query='
            query($pr: ID!) {
              node(id: $pr) {
                ... on PullRequest {
                  reviewThreads(first: 50) {
                    nodes {
                      id
                      isResolved
                      isOutdated
                      comments(first: 1) {
                        nodes { body }
                      }
                    }
                  }
                }
              }
            }' -f pr="$PR_NODE_ID" --jq \
            '[.data.node.reviewThreads.nodes[] | select(.isResolved == false and .isOutdated == false)]')

          UNRESOLVED_COUNT=$(echo "$THREADS" | jq 'length')
          echo "unresolved_count=$UNRESOLVED_COUNT" >> "$GITHUB_OUTPUT"

          # Save thread IDs and first-comment bodies for evaluation
          printf '%s' "$THREADS" > /tmp/unresolved_threads.json
          echo "threads_file=/tmp/unresolved_threads.json" >> "$GITHUB_OUTPUT"

      - name: Evaluate fix completeness via GitHub Models (gpt-4o-mini) with heuristic fallback
        id: evaluate
        if: ${{ steps.verify_signal.outputs.verified == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          UNRESOLVED_COUNT="${{ steps.fetch_threads.outputs.unresolved_count }}"
          SIGNAL_BODY_FILE="${{ steps.find_fix_signal.outputs.signal_body_file }}"
          THREADS_FILE="${{ steps.fetch_threads.outputs.threads_file }}"

          SIGNAL_BODY=$(cat "$SIGNAL_BODY_FILE" 2>/dev/null || echo "")
          THREADS=$(cat "$THREADS_FILE" 2>/dev/null || echo "[]")

          EVALUATION="incomplete"

          # Fast path: zero unresolved threads indicates complete fix
          if [[ "$UNRESOLVED_COUNT" -eq 0 ]]; then
            echo "Zero unresolved threads — fix is complete (fast path)."
            EVALUATION="resolved"
          else
            # Attempt GitHub Models evaluation
            THREAD_SUMMARIES=$(echo "$THREADS" | jq -r '
              [.[] | "- " + (.comments.nodes[0].body // "(no body)" | .[0:200])] | join("\n")
            ')

            PROMPT="A developer named Copilot committed fixes after a code review. The fix-applied message is:\n\n${SIGNAL_BODY}\n\nThe following review threads remain unresolved:\n\n${THREAD_SUMMARIES}\n\nBased on the fix message and thread content, were all review suggestions addressed? Reply with only: RESOLVED or INCOMPLETE."

            AI_RESPONSE=$(curl -s --fail \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://models.inference.ai.azure.com/chat/completions" \
              -d "{\"model\":\"gpt-4o-mini\",\"messages\":[{\"role\":\"user\",\"content\":$(printf '%s' "$PROMPT" | jq -Rs .)}],\"max_tokens\":10,\"temperature\":0}" \
              --jq '.choices[0].message.content' 2>/dev/null || echo "")

            if echo "$AI_RESPONSE" | grep -qi "^RESOLVED"; then
              echo "GitHub Models evaluation: RESOLVED."
              EVALUATION="resolved"
            elif echo "$AI_RESPONSE" | grep -qi "^INCOMPLETE"; then
              echo "GitHub Models evaluation: INCOMPLETE."
              EVALUATION="incomplete"
            else
              # Heuristic fallback: check signal body for positive keywords
              echo "GitHub Models unavailable or inconclusive. Applying keyword heuristic."
              if echo "$SIGNAL_BODY" | grep -qiE "all (issues|comments|suggestions) (addressed|resolved|fixed)|all requested changes"; then
                echo "Heuristic: positive keywords found — RESOLVED."
                EVALUATION="resolved"
              else
                echo "Heuristic: no conclusive positive keywords — INCOMPLETE."
                EVALUATION="incomplete"
              fi
            fi
          fi

          echo "evaluation=$EVALUATION" >> "$GITHUB_OUTPUT"

      - name: Resolve review threads and re-request Copilot review (resolved path)
        if: ${{ steps.verify_signal.outputs.verified == 'true' && steps.evaluate.outputs.evaluation == 'resolved' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLASSIC_PAT }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ steps.resolve_pr.outputs.pr_number }}"
          THREADS_FILE="${{ steps.fetch_threads.outputs.threads_file }}"

          THREADS=$(cat "$THREADS_FILE" 2>/dev/null || echo "[]")
          THREAD_IDS=$(echo "$THREADS" | jq -r '.[].id')

          # Resolve all unresolved threads
          while IFS= read -r THREAD_ID; do
            if [[ -z "$THREAD_ID" ]]; then continue; fi
            echo "Resolving thread $THREAD_ID..."
            gh api graphql -f query='
              mutation($threadId: ID!) {
                resolveReviewThread(input: { threadId: $threadId }) {
                  thread { id isResolved }
                }
              }' -f threadId="$THREAD_ID" >/dev/null
          done <<< "$THREAD_IDS"

          echo "All threads resolved. Re-requesting Copilot code review..."

          # Re-request review from Copilot
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer "Copilot"

          echo "Review re-requested for PR #$PR_NUMBER."

      - name: Post FIX-INCOMPLETE comment and re-trigger fix request (incomplete path)
        if: ${{ steps.verify_signal.outputs.verified == 'true' && steps.evaluate.outputs.evaluation == 'incomplete' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ steps.resolve_pr.outputs.pr_number }}"
          THREADS_FILE="${{ steps.fetch_threads.outputs.threads_file }}"

          THREADS=$(cat "$THREADS_FILE" 2>/dev/null || echo "[]")
          UNRESOLVED_LIST=$(echo "$THREADS" | jq -r '
            [.[] | "- " + (.comments.nodes[0].body // "(no body)" | .[0:300])] | join("\n")
          ')

          if [[ -z "$UNRESOLVED_LIST" ]]; then
            UNRESOLVED_LIST="- (could not retrieve thread details)"
          fi

          MARKER="<!-- review-id: ${{ github.event.workflow_run.id }} -->"
          TAG_INCOMPLETE="[EX:FIX-INCOMPLETE]"
          TAG_TRIGGER="[EX:TRIGGER-FIX-REQUEST]"
          COMMENT_BODY="${TAG_INCOMPLETE}"$'\n'"${TAG_TRIGGER}"$'\n'"${MARKER}"$'\n'"@copilot The previous fix was incomplete. The following review threads remain unresolved:"$'\n\n'"${UNRESOLVED_LIST}"$'\n\n'"Please address all remaining items and push the fixes."

          gh api \
            --method POST \
            "/repos/$REPO/issues/$PR_NUMBER/comments" \
            -f body="$COMMENT_BODY" >/dev/null

          echo "Posted FIX-INCOMPLETE + TRIGGER-FIX-REQUEST on PR #$PR_NUMBER."
