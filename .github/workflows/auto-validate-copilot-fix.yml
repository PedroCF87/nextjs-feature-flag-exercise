name: Auto Validate Copilot Fix

# Purpose: After Copilot pushes fix commits, evaluates whether all code-review
# suggestions were addressed. If complete, re-requests the Copilot code review.
# If incomplete, asks Copilot to finish.
#
# Key logic:
#   1. Resolves the open PR for the pushed branch.
#   2. Searches recent comments for a Copilot fix-applied signal ([EX:FIX-APPLIED],
#      "addressed in", "applied in"). Retries up to 6 × 10 s.
#   3. Verifies the fix is a response to a preceding [EX:TRIGGER-FIX-REQUEST].
#   4. Guards against re-processing the same fix on multiple pushes.
#   5. Calls GitHub Models (gpt-4o-mini) to evaluate if all changes were resolved.
#      Falls back to keyword heuristic if the API fails.
#   6. If resolved: resolves open review threads via resolveReviewThread GraphQL
#      mutation, then re-requests Copilot code review via gh pr edit --add-reviewer.
#   7. If incomplete: posts [EX:FIX-INCOMPLETE] + [EX:TRIGGER-FIX-REQUEST] comment.
#
# Required secrets:
#   - COPILOT_CLASSIC_PAT: Classic PAT with repo scope. Required for
#     resolveReviewThread mutation and gh pr edit --add-reviewer @copilot.
#     Fine-Grained PATs are FORBIDDEN for both operations when the PR was created
#     by the Copilot GitHub App.

on:
  workflow_run:
    workflows: ['Copilot Push Signal']
    types: [completed]

jobs:
  validate-fix:
    runs-on: ubuntu-latest

    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.type == 'Bot' &&
      (github.event.workflow_run.actor.login == 'Copilot' || github.event.workflow_run.actor.login == 'copilot[bot]') &&
      github.event.workflow_run.repository.full_name == github.repository

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Evaluate Copilot fix and act
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_CLASSIC_PAT }}
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const headSha = context.payload.workflow_run.head_sha;
            core.info(`Validating fix for branch: ${branch}, sha: ${headSha}`);

            // 1. Find open PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              core.info(`No open PR for branch "${branch}" — skipping.`);
              return;
            }
            const pr = prs[0];
            core.info(`Found PR #${pr.number}: "${pr.title}"`);

            // 2. Retrieve all PR comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            // 3. Look for a [EX:TRIGGER-FIX-REQUEST] comment (must exist to proceed)
            const triggerComment = [...comments].reverse().find(c =>
              c.body && c.body.includes('[EX:TRIGGER-FIX-REQUEST]')
            );
            if (!triggerComment) {
              core.info('No [EX:TRIGGER-FIX-REQUEST] comment found — this push is not a fix response.');
              return;
            }

            // 4. Look for Copilot's fix-applied signal posted AFTER the trigger
            let fixComment = null;
            for (let attempt = 1; attempt <= 6; attempt++) {
              const postTrigger = comments.filter(c =>
                new Date(c.created_at) > new Date(triggerComment.created_at) &&
                c.id !== triggerComment.id
              );
              fixComment = postTrigger.find(c =>
                c.body && (
                  c.body.includes('[EX:FIX-APPLIED]') ||
                  /\b(addressed|applied|fixed)\s+in\b/i.test(c.body)
                )
              );
              if (fixComment) break;
              core.info(`Attempt ${attempt}/6: fix signal not yet detected, waiting 10 s...`);
              await new Promise(r => setTimeout(r, 10_000));
            }

            if (!fixComment) {
              core.info('No fix-applied signal found after polling — this push may be the initial one.');
              return;
            }

            // 5. Guard: skip if we already processed this same fix commit
            const alreadyProcessed = comments.some(c =>
              c.body && (
                c.body.includes('[EX:FIX-INCOMPLETE]') ||
                c.body.includes(`re-requested Copilot review after fix`)
              ) &&
              new Date(c.created_at) > new Date(fixComment.created_at)
            );
            if (alreadyProcessed) {
              core.info('Fix already evaluated for this commit — skipping.');
              return;
            }

            // 6. Query all unresolved review threads
            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    reviewThreads(first: 100) {
                      nodes {
                        id
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes { body path line }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              prNumber: pr.number,
            });

            const threads = result.repository.pullRequest.reviewThreads.nodes;
            const unresolved = threads.filter(t => !t.isResolved && !t.isOutdated);

            core.info(`Unresolved threads: ${unresolved.length}`);

            // 7. Use GitHub Models (gpt-4o-mini) to evaluate fix completeness
            let allFixed = false;

            if (unresolved.length === 0) {
              allFixed = true;
              core.info('All threads are resolved — marking as complete.');
            } else {
              try {
                const threadSummary = unresolved
                  .map(t => {
                    const c = t.comments.nodes[0];
                    return `- ${c?.path || '?'} (line ${c?.line || '?'}): ${(c?.body || '').slice(0, 200)}`;
                  })
                  .join('\n');

                const fixSummary = fixComment.body.slice(0, 1000);

                const response = await fetch(
                  'https://models.inference.ai.azure.com/chat/completions',
                  {
                    method: 'POST',
                    headers: {
                      Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                      model: 'gpt-4o-mini',
                      messages: [
                        {
                          role: 'system',
                          content:
                            'You are a code review evaluator. Answer only "yes" or "no".',
                        },
                        {
                          role: 'user',
                          content:
                            `Unresolved review threads:\n${threadSummary}\n\n` +
                            `Copilot fix response:\n${fixSummary}\n\n` +
                            `Were all the unresolved threads addressed? Answer "yes" or "no" only.`,
                        },
                      ],
                      max_tokens: 10,
                    }),
                  }
                );

                if (response.ok) {
                  const json = await response.json();
                  const answer = json.choices?.[0]?.message?.content?.toLowerCase() || '';
                  allFixed = answer.startsWith('yes');
                  core.info(`GitHub Models evaluation: "${answer}" → allFixed=${allFixed}`);
                } else {
                  core.warning(`GitHub Models API returned ${response.status} — falling back to keyword heuristic.`);
                  allFixed = /\b(all|every|each)\b.*\b(fix|address|resolv)/i.test(fixComment.body);
                }
              } catch (err) {
                core.warning(`GitHub Models call failed: ${err.message} — using keyword heuristic.`);
                allFixed = /\b(all|every|each)\b.*\b(fix|address|resolv)/i.test(fixComment.body);
              }
            }

            if (allFixed) {
              // 8a. Resolve all open threads
              for (const thread of unresolved) {
                try {
                  await github.graphql(`
                    mutation($threadId: ID!) {
                      resolveReviewThread(input: { threadId: $threadId }) {
                        thread { id isResolved }
                      }
                    }
                  `, { threadId: thread.id });
                  core.info(`Resolved thread ${thread.id}`);
                } catch (err) {
                  core.warning(`Could not resolve thread ${thread.id}: ${err.message}`);
                }
              }

              // 8b. Re-request Copilot code review via gh CLI
              process.env.GH_TOKEN = process.env.GITHUB_TOKEN;
              const { execSync } = require('child_process');
              try {
                execSync(
                  `gh pr edit ${pr.number} --add-reviewer @copilot --repo ${context.repo.owner}/${context.repo.repo}`,
                  { stdio: 'pipe', env: { ...process.env, GH_TOKEN: process.env.GITHUB_TOKEN } }
                );
                core.info(`Re-requested Copilot review on PR #${pr.number}`);
              } catch (err) {
                core.warning(`gh pr edit failed: ${err.message}`);
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `✅ All review threads resolved. Re-requested Copilot review after fix commit \`${headSha.slice(0, 7)}\`.`,
              });
            } else {
              // 8c. Ask Copilot to finish fixing
              const remaining = unresolved
                .map(t => {
                  const c = t.comments.nodes[0];
                  return `- **\`${c?.path || '?'}\`** (line ${c?.line || '?'}): ${(c?.body || '').split('\n')[0].slice(0, 120)}`;
                })
                .join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body:
                  `\`[EX:FIX-INCOMPLETE]\`\n` +
                  `\`[EX:TRIGGER-FIX-REQUEST]\`\n` +
                  `<!-- review-id: recheck-${headSha.slice(0, 7)} -->\n` +
                  `@copilot The following review threads are still unresolved. ` +
                  `Please address them and push a new commit:\n\n${remaining}`,
              });
              core.info(`Posted [EX:FIX-INCOMPLETE] — ${unresolved.length} threads remain.`);
            }
