name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Authentication: use ONE of these options
          #
          # Option 1: API key (recommended for CI/CD - pay per token)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          #
          # Option 2: Claude Pro/Max subscription via OAuth token
          # Generate with: claude setup-token
          # Note: technically against Anthropic TOS for multiple developers to use a single subscription
          # anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
